spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/ntt_transaction
      auto-index-creation: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: transaction-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

transaction:
  kafka:
    topics:
      apply-payment-command: apply-payment-command-topic
      payment-applied: payment-applied-topic
      payment-rejected: payment-rejected-topic
      transactions-executed: transactions-executed-topic
